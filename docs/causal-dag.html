<div id="causal-dag-container" style="display:none;">
<script type="module">
import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";
mermaid.initialize({startOnLoad:false, securityLevel:"loose", theme:"dark",
  themeVariables:{background:"#000",primaryColor:"#999",lineColor:"#C00",primaryTextColor:"#000"}});
document.querySelectorAll("script[data-mermaid]").forEach(function(s){
  var t = document.getElementById(s.getAttribute("data-mermaid"));
  if(t) t.textContent = s.textContent;
});
// Relocate into the causal page
var container = document.getElementById("causal-dag-container");
var target = document.getElementById("causal-dag-mount");
if (target && container) {
  container.style.display = "block";
  target.appendChild(container);
}
await mermaid.run({querySelector:".mermaid"});
// Click-to-zoom: toggle fullscreen on click
container.addEventListener("click", function() {
  container.classList.toggle("dag-fullscreen");
});
</script>
<pre class="mermaid" id="causal-dag-pre"></pre>
<script type="text/plain" data-mermaid="causal-dag-pre">
