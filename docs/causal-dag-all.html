<!-- Mermaid CDN + init (once) -->
<script type="module">
import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";
mermaid.initialize({startOnLoad:false, securityLevel:"loose", theme:"dark",
  flowchart:{defaultRenderer:"elk", nodeSpacing:30, rankSpacing:80},
  themeVariables:{background:"#000",primaryColor:"#999",lineColor:"#C00",primaryTextColor:"#000"}});
// Copy text from script tags to pre tags
document.querySelectorAll("script[data-mermaid]").forEach(function(s){
  var t = document.getElementById(s.getAttribute("data-mermaid"));
  if(t) t.textContent = s.textContent;
});
// Relocate each diagram to its mount point
["overview","full","drif","fmax","ltr"].forEach(function(id){
  var container = document.getElementById("dag-"+id+"-container");
  var mount = document.getElementById("dag-"+id+"-mount");
  if(container && mount){ container.style.display="block"; mount.appendChild(container); }
});
await mermaid.run({querySelector:".mermaid"});
// Click-to-zoom on all diagram containers
document.querySelectorAll("[id$='-container']").forEach(function(c){
  c.addEventListener("click", function(){ c.classList.toggle("dag-fullscreen"); });
});
</script>
