template:
  bootstrap: 5
  bslib:
    preset: shiny

navbar:
  structure:
    left: [home, reference, articles]
    right: [github]
  components:
    github:
      icon: fab fa-github
      href: https://github.com/JohnGavin/historical
      aria-label: GitHub
    home:
      icon: fas fa-home
      href: https://johngavin.github.io/historical/
      aria-label: Home
    articles:
      text: Articles
      menu:
        - text: "── Data ──"
        - text: Usage Examples
          href: https://johngavin.github.io/historical/examples.html
        - text: "── Factor-Level Backtests ──"
        - text: Macro Defense Rotation
          href: https://johngavin.github.io/historical/macro-defense-rotation.html
        - text: Factor MAX Rotation
          href: https://johngavin.github.io/historical/factor-max.html
        - text: "DRIF: Daily Return Information"
          href: https://johngavin.github.io/historical/drif.html
        - text: "── Stock-Level Backtests ──"
        - text: "Stock-Level: 4-Strategy Comparison"
          href: https://johngavin.github.io/historical/stock-backtest.html

reference:
  - title: Data Access
    desc: Fetch OHLCV, macro, and factor data from HF-hosted Parquet
    contents:
      - hd_ohlcv
      - hd_macro
      - hd_factors
      - hd_lazy

  - title: External Data Sources
    desc: Access data from ECB, Guardian, and JST Macrohistory
    contents:
      - hd_ecb
      - hd_ecb_registry
      - hd_guardian
      - hd_guardian_monthly
      - hd_jst
      - hd_jst_variables

  - title: Macro Extensions
    desc: Forward-looking macro, vintages, and registry
    contents:
      - hd_macro_forward
      - hd_macro_registry
      - hd_macro_vintages

  - title: Discovery
    desc: Search, explore, and summarise available datasets and tickers
    contents:
      - hd_search
      - hd_summary
      - hd_exchanges
      - hd_tickers
      - hd_macro_series
      - hd_ticker_info
      - hd_ticker_meta
      - hd_fred_meta
      - hd_datasets

  - title: Curated Groups & Ranking
    desc: Pre-defined ticker groups and ranked ticker lists
    contents:
      - hd_ticker_groups
      - hd_group
      - hd_top_by
      - hd_most_volatile

  - title: Quality & Audit
    desc: Data quality checks and Point-in-Time amendment tracking
    contents:
      - hd_jumps
      - hd_quality
      - hd_amendments
      - hd_metadata_amendments
      - hd_revision_analysis

  - title: Performance Metrics
    desc: Sharpe ratios, HAC-robust statistics, and deflated metrics
    contents:
      - hd_hac_sharpe
      - hd_hac_tstat
      - hd_deflated_sharpe
      - hd_delta_z
      - hd_drawdown_overlap
      - hd_horizon_skill

  - title: Scoring & Calibration
    desc: Brier scores, CRPS, and forecast calibration metrics
    contents:
      - hd_brier_score
      - hd_crps_empirical
      - hd_crps_normal
      - hd_crps_skill

  - title: Kelly & Position Sizing
    desc: Kelly criterion variants and effective sample size
    contents:
      - hd_kelly_bayesian
      - hd_kelly_bounded
      - hd_kelly_rolling
      - hd_keff
      - hd_tail_keff
      - hd_tail_dependence

  - title: Trade Analysis
    desc: Trade-level metrics and event analysis
    contents:
      - hd_event_trades
      - hd_monthly_trades
      - hd_shadow_trades
      - hd_trade_metrics

  - title: Null Hypothesis Testing
    desc: Factor null tests and simulation environments
    contents:
      - hd_factor_null_test
      - hd_null_rejection_rate
      - hd_null_env_white_noise
      - hd_null_env_ma1
      - hd_null_env_garch11
      - hd_null_env_gjr_garch
      - hd_null_env_jump_diffusion
      - hd_null_env_regime_vol
      - hd_null_env_factor_null

  - title: Results Storage
    desc: Append, query, and manage backtest results
    contents:
      - hd_results_append
      - hd_results_query
      - hd_results_schema

  - title: Infrastructure
    desc: DuckDB connections, caching, and downloads
    contents:
      - hd_connect
      - hd_connect_local
      - hd_download
      - hd_cache_path
      - hd_cache_clear

  - title: Visualisation
    desc: Plot theme and colour palette for dark backgrounds
    contents:
      - hd_theme
      - hd_palette
