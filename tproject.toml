[project]
name = "historical_data"
description = "Historical finance database: Python fetches + R validates/cleans + Parquet distribution"

[dependencies]

[r-dependencies]
packages = ["dplyr", "arrow", "duckdb", "duckplyr", "ggplot2", "glmnet", "pointblank", "scales", "targets", "crew", "DT", "fredr", "frenchdata", "httr2", "jsonlite", "knitr", "reticulate", "testthat", "tidyr", "cli", "rlang"]

[py-dependencies]
version = "python313"
packages = ["yfinance", "pandas", "pyarrow", "pytest"]

[additional-tools]
packages = ["quarto"]

[t]
min_version = "0.51.2"
