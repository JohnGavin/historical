[project]
name = "historical_data"
description = "Historical finance database: Python fetches + R validates/cleans + Parquet distribution"

[dependencies]

[r-dependencies]
packages = ["dplyr", "arrow", "curl", "duckdb", "duckplyr", "devtools", "ggplot2", "glmnet", "pkgload", "pointblank", "reviser", "roxygen2", "scales", "targets", "crew", "DT", "fredr", "frenchdata", "httr2", "jsonlite", "knitr", "purrr", "reticulate", "testthat", "tidyr", "xgboost", "cli", "rlang", "usethis", "HierPortfolios", "yfscreen"]

[py-dependencies]
version = "python313"
packages = ["yfinance", "pandas", "pyarrow", "pytest"]

[additional-tools]
packages = ["quarto"]

[t]
min_version = "0.51.2"
