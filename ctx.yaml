signature: hd_trade_metrics(trades, ann_factor = 12L, n_years = NA_real_)
arguments:
  trades: Trades tibble (output of hd_monthly_trades or hd_event_trades)
  ann_factor: Annualisation factor (default 12L for monthly trades)
  n_years: Number of years for CAGR normalisation (NA_real_ = auto-compute)
returns: Named list of performance metrics (CAGR, Sharpe, max drawdown, win rate, etc.)
family: trades
