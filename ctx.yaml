kind: function
name: hd_ohlcv
exported: true
signature: hd_ohlcv(ticker, from = NULL, to = NULL, dataset = NULL, local = FALSE, collect = TRUE)
arguments:
  ticker: Ticker symbol(s). Character scalar or vector. Single "AAPL" or batch c("AAPL","MSFT").
  from: Start date (character or Date). Default no filter.
  to: End date (character or Date). Default no filter.
  dataset: Dataset name from registry. If NULL (default), auto-detected per ticker via detect_dataset().
  local: If TRUE, query local cache instead of remote.
  collect: If TRUE (default), materialise to tibble. If FALSE, return lazy duckplyr frame.
returns: >
  Lazy duckplyr frame (collect=FALSE) or tibble (collect=TRUE) with OHLCV columns.
  Mixed-dataset batches (e.g. c("AAPL","BTC")) are always materialised.
family: data-access
