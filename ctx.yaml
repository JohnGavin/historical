---
kind: context_header
llm_instructions: >
  This is an LLM-optimised API specification for the R package 'historicaldata'.
  Use this context to write correct code using historicaldata functions.
  Each 'function' record describes a public exported function with its signature,
  arguments, and purpose. The 'package' record contains metadata and data-source
  descriptions. All listed functions are part of the public API. The package
  accesses financial data via DuckDB's native hf:// protocol against Parquet
  files stored on Hugging Face Datasets — no data is bundled. Set the
  HD_HF_REPO environment variable to override the default repo
  (JohnGavin/finance-data). Set HD_CACHE_DIR to use a local cache.
---
kind: package
schema_version: '1.1'
name: historicaldata
version: 0.1.0
language: R
description: >
  Code-only R package providing access to historical OHLCV data for equities,
  crypto, macro series, and factor returns. Data is stored as Parquet on
  Hugging Face Datasets and queried via DuckDB hf:// with predicate pushdown.
  No data is bundled — the package ships access functions and a dataset registry.
last_synced: '2026-05-18'
data_sources:
  equity_daily:
    url: hf://datasets/JohnGavin/finance-data/equity_daily.parquet
    schema: [date, open, high, low, close, adjusted, volume, ticker, source, asset_class]
    frequency: daily
    description: US equities daily OHLCV (Yahoo Finance)
  crypto_daily:
    url: hf://datasets/JohnGavin/finance-data/crypto_daily.parquet
    schema: [date, close, volume, market_cap, ticker, source, asset_class]
    frequency: daily
    description: Cryptocurrency daily prices (CoinGecko)
  macro_daily:
    url: hf://datasets/JohnGavin/finance-data/macro_daily.parquet
    schema: [date, value, series_id, source]
    frequency: mixed
    description: FRED macro series (SP500, VIX, rates, GDP, CPI, etc.)
  factors:
    url: hf://datasets/JohnGavin/finance-data/factors.parquet
    schema: [date, factor_name, value, dataset, frequency, source]
    frequency: daily+monthly
    description: Fama-French factors (FF3, FF5, Momentum, 1926+)
  metadata:
    url: hf://datasets/JohnGavin/finance-data/metadata.parquet
    schema: [ticker, dataset, long_name, exchange, currency, instrument_type,
             sector, industry, country, market_cap, volume_avg, fifty_two_week_high,
             fifty_two_week_low, expense_ratio, yield_pct, category, fund_family,
             nav_price, beta_3yr, ytd_return, three_yr_return, start_date, end_date,
             total_obs, missing_pct]
    frequency: static
    description: Per-ticker metadata including exchange, sector, market cap, ETF fees/yield/returns, coverage stats
  macro_vintages:
    url: hf://datasets/JohnGavin/finance-data/macro_vintages.parquet
    schema: [series_id, date, pub_date, value]
    frequency: vintage
    description: FRED macro revision history — value as known at each publication date (ALFRED API)
  metadata_amendments:
    url: hf://datasets/JohnGavin/finance-data/metadata_amendments.parquet
    schema: [ticker, field, old_value, new_value, source, method, amended_at, amended_by, reversible]
    frequency: append-only
    description: PIT log of all metadata changes — computed fields, enrichments, corrections
---
kind: function
name: hd_datasets
exported: true
signature: hd_datasets()
returns: Named list of dataset metadata (url, schema, frequency, description) for each registered dataset
