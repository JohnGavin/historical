name: Weekly Data Poll

on:
  schedule:
    - cron: '0 6 * * 6'  # Every Saturday at 06:00 UTC
  workflow_dispatch:        # Manual trigger via GitHub UI

jobs:
  poll:
    runs-on: ubuntu-latest
    # Allow individual sources to fail without blocking others
    strategy:
      fail-fast: false
      matrix:
        source:
          - kalshi
          - ecb             # ECB SDMX REST API (no auth)
          - guardian        # Guardian Content API (test key, no auth)
          - commodities     # FRED commodity indexes (requires FRED_API_KEY secret)
          - cboe_vol        # CBOE implied vol CDN (46 series, no auth)
          # - nyt_tedalcorn # parse_nyt_tedalcorn.R (no auth, low priority)

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libuv1-dev

      - name: Ensure data directory exists
        run: mkdir -p data/raw

      - name: Install R dependencies
        shell: Rscript {0}
        run: |
          install.packages(
            c("jsonlite", "arrow", "dplyr", "cli", "here",
              "httr2", "tibble", "tidyr", "purrr", "quantmod", "pkgload",
              "DBI", "duckdb", "duckplyr", "ggplot2"),
            repos = "https://cloud.r-project.org"
          )

      - name: Run fetch script
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
        run: Rscript scripts/fetch_${{ matrix.source }}.R

      - name: Commit if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/raw/
          git diff --cached --quiet || git commit -m "data: ${{ matrix.source }} $(date +%Y-%m-%d)"
          git push
